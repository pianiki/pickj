<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Saldo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }body {
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 30px;
  width: 320px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.profile-img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #38bdf8;
  margin-bottom: 15px;
}

h2 { margin-bottom: 15px; }

.saldo-box {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 10px;
}

.plus { color: #22c55e; font-weight: 600; }
.minus { color: #ef4444; font-weight: 600; }

.label { font-size: 12px; opacity: 0.7; }
.value { font-size: 18px; }

  </style>
</head>
<body>  <div class="card" id="mainCard">
    <img src="https://via.placeholder.com/100" class="profile-img">
    <h2>user20912[pian]</h2><div class="saldo-box">
  <div class="label">Saldo + (bersih)</div>
  <div class="value plus" id="plusText">+ Rp 0</div>
</div>

<div class="saldo-box">
  <div class="label">Saldo - (bersih)</div>
  <div class="value minus" id="minusText">- Rp 0</div>
</div>

  </div>  <script>
    function formatRupiah(angka) {
      return 'Rp ' + angka.toLocaleString('id-ID');
    }

    function saveData() {
      let plus = document.getElementById('plusInput').value || 0;
      let minus = document.getElementById('minusInput').value || 0;

      localStorage.setItem('plus', plus);
      localStorage.setItem('minus', minus);

      alert('ke save anjing');
    }

    function loadData() {
      let plus = localStorage.getItem('plus') || 0;
      let minus = localStorage.getItem('minus') || 0;

      document.getElementById('plusText').innerText = '+ ' + formatRupiah(parseInt(plus));
      document.getElementById('minusText').innerText = '- ' + formatRupiah(parseInt(minus));
    }

    if (window.location.search.includes('admin')) {
      document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;color:white;font-family:Poppins">
          <h2>Admin Panel</h2>
          <input type="number" id="plusInput" placeholder="Saldo +" style="margin:5px;padding:10px;border-radius:10px;border:none">
          <input type="number" id="minusInput" placeholder="Saldo -" style="margin:5px;padding:10px;border-radius:10px;border:none">
          <button onclick="saveData()" style="margin-top:10px;padding:10px;border:none;border-radius:10px;background:#38bdf8">Save</button>
        </div>
      `;
    } else {
      loadData();
    }
  </script></body>
</html>
